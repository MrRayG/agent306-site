  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #0f0f0f;
      --color-surface: #161616;
      --color-surface-2: #1a1a1a;
      --color-border: #2a2a2a;
      --color-text: #e0e0e0;
      --color-text-muted: #8a8a8a;
      --color-text-faint: #555;
      --color-accent: #2dd4bf;
      --color-accent-dim: rgba(45, 212, 191, 0.15);
      --color-accent-glow: rgba(45, 212, 191, 0.08);

      --font-display: 'Clash Display', 'Arial Black', sans-serif;
      --font-body: 'Satoshi', 'Inter', sans-serif;

      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);
      --text-3xl:  clamp(2.5rem,   1rem    + 4vw,    5rem);
      --text-hero: clamp(3rem,     0.5rem  + 7vw,    8rem);

      --space-1:  0.25rem;
      --space-2:  0.5rem;
      --space-3:  0.75rem;
      --space-4:  1rem;
      --space-6:  1.5rem;
      --space-8:  2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-20: 5rem;
      --space-24: 6rem;

      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background-color: var(--color-bg);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    ::selection {
      background: rgba(45, 212, 191, 0.25);
      color: #fff;
    }

    a {
      color: var(--color-accent);
      text-decoration: none;
      transition: color var(--transition-interactive), opacity var(--transition-interactive);
    }
    a:hover {
      opacity: 0.8;
    }

    /* ===== AMBIENT BACKGROUND ===== */
    .ambient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .ambient::before {
      content: '';
      position: absolute;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(ellipse, rgba(45, 212, 191, 0.04) 0%, transparent 70%);
      animation: ambient-pulse 8s ease-in-out infinite;
    }

    @keyframes ambient-pulse {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.15); }
    }

    /* ===== MAIN CONTAINER ===== */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: var(--space-8) var(--space-6);
      text-align: center;
    }

    /* ===== FADE-IN ANIMATION ===== */
    .fade-up {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.8s var(--ease-out) forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.3s; }
    .delay-3 { animation-delay: 0.5s; }
    .delay-4 { animation-delay: 0.7s; }
    .delay-5 { animation-delay: 0.9s; }
    .delay-6 { animation-delay: 1.1s; }

    /* ===== SVG LOGO ===== */
    .logo-mark {
      width: clamp(56px, 8vw, 88px);
      height: auto;
      margin-bottom: var(--space-8);
    }

    .logo-mark .accent {
      fill: var(--color-accent);
    }

    .logo-mark .frame {
      fill: none;
      stroke: var(--color-accent);
      stroke-width: 1.5;
    }

    .logo-mark .num {
      fill: var(--color-accent);
      font-family: var(--font-display);
      font-weight: 700;
    }

    /* ===== HERO ===== */
    .hero-title {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: var(--space-4);
    }

    .hero-tagline {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 500;
      color: var(--color-accent);
      letter-spacing: 0.02em;
      margin-bottom: var(--space-8);
      text-shadow: 0 0 40px rgba(45, 212, 191, 0.2);
    }

    .separator {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
      margin: 0 auto var(--space-8);
      opacity: 0.6;
    }

    .coming-soon {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: var(--space-16);
    }

    /* ===== IDENTITY SECTION ===== */
    .identity {
      max-width: 520px;
      margin-bottom: var(--space-12);
    }

    .identity p {
      color: var(--color-text-muted);
      font-size: var(--text-base);
      line-height: 1.7;
      margin: 0 auto;
      max-width: 480px;
    }

    .identity p + p {
      margin-top: var(--space-2);
    }

    .identity .statement {
      color: var(--color-text);
      font-weight: 500;
    }

    /* ===== LINKS SECTION ===== */
    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-16);
    }

    .link-item {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      transition: color var(--transition-interactive);
    }

    .link-item:hover {
      color: var(--color-accent);
      opacity: 1;
    }

    .link-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-1) var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: 9999px;
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--color-text-muted);
      background: var(--color-surface);
      letter-spacing: 0.02em;
      transition: border-color var(--transition-interactive), color var(--transition-interactive);
    }

    .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-accent);
      animation: badge-pulse 3s ease-in-out infinite;
    }

    @keyframes badge-pulse {
      0%, 100% { opacity: 0.5; box-shadow: 0 0 0 0 rgba(45, 212, 191, 0); }
      50% { opacity: 1; box-shadow: 0 0 8px 2px rgba(45, 212, 191, 0.3); }
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: auto;
      padding: var(--space-8) var(--space-6);
      text-align: center;
    }

    .footer p {
      color: var(--color-text-faint);
      font-size: var(--text-xs);
      line-height: 1.7;
      margin: 0 auto;
    }

    .footer .ecosystem {
      font-weight: 500;
      color: var(--color-text-muted);
      letter-spacing: 0.04em;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .page {
        padding: var(--space-6) var(--space-4);
      }

      .hero-title {
        letter-spacing: -0.01em;
      }

      .links {
        gap: var(--space-3);
      }
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .fade-up {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>

      </a>
    </nav>

  </main>

</body>
